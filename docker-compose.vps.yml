services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      PIXVERSE_API_KEY: ${PIXVERSE_API_KEY:?Set PIXVERSE_API_KEY in your VPS .env file}
      PIXVERSE_BASE_URL: ${PIXVERSE_BASE_URL:-https://app-api.pixverse.ai}
      ENABLE_PROMPT_ASSIST: ${ENABLE_PROMPT_ASSIST:-false}
      XAI_API_KEY: ${XAI_API_KEY:-}
      XAI_BASE_URL: ${XAI_BASE_URL:-https://api.x.ai}
      PIXVERSE_WEBHOOK_SECRET: ${PIXVERSE_WEBHOOK_SECRET:-}
      POLLING_INTERVAL_SECONDS: ${POLLING_INTERVAL_SECONDS:-5}
      GENERATION_MODELS: ${GENERATION_MODELS:-v3.5,v4,v4.5,v5.6,c1}
      GENERATION_QUALITIES: ${GENERATION_QUALITIES:-360p,540p,720p,1080p}
      GENERATION_DURATIONS: ${GENERATION_DURATIONS:-5,8}
      GENERATION_MOTION_MODES: ${GENERATION_MOTION_MODES:-normal,fast}
      GENERATION_ASPECT_RATIOS: ${GENERATION_ASPECT_RATIOS:-16:9,9:16,1:1,3:4,4:3}
      GENERATION_CAMERA_MOVEMENTS: ${GENERATION_CAMERA_MOVEMENTS:-}
      JOBS_DB_PATH: ${JOBS_DB_PATH:-data/jobs.sqlite3}
    expose:
      - "8000"
    volumes:
      - api_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  api_data:
